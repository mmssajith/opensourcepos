
include:
    - docker-compose.dev.yml

services:
    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: phpmyadmin
        restart: always
        depends_on:
            mysql:
                condition: service_healthy
        ports:
            - 8011:80"
        networks:
            - app_net
        environment:
            - MYSQL_USERNAME=admin
            - MYSQL_ROOT_PASSWORD=pointofsale
            - PMA_HOST=mysql
